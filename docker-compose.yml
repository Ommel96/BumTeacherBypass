services:
  app:
    build: .
    container_name: bumteacherbypass
    ports:
      - "3847:3847"
    environment:
      - PORT=3847
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3847/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

volumes:
  db-data:
