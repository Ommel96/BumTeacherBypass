services:
  app:
    build: .
    container_name: bumteacherbypass
    ports:
      - "3847:3847"
    environment:
      - PORT=3847
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    # Fixed public resolvers: the embedded Docker DNS snapshots the host's
    # resolv.conf at container start, so switching networks/VPN (e.g. Tailscale)
    # after startup breaks all lookups (EAI_AGAIN) until a restart. The app only
    # resolves public hostnames, so pinning public DNS makes it immune to that.
    dns:
      - 1.1.1.1
      - 9.9.9.9
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3847/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  db-data: